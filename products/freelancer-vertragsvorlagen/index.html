<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Vertragsvorlagen - Freelancer Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        header h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin: 60px 0;
        }
        .feature {
            padding: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .feature h3 {
            margin-bottom: 10px;
            color: #667eea;
        }
        .pricing {
            background: #f8f9fa;
            padding: 60px 20px;
            text-align: center;
            margin: 60px 0;
        }
        .price {
            font-size: 3em;
            color: #667eea;
            margin: 20px 0;
        }
        .cta {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 15px 40px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.1em;
            margin: 20px 0;
            transition: background 0.3s;
        }
        .cta:hover {
            background: #764ba2;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Freelancer Vertragsvorlagen</h1>
            <p>5 rechtssichere Vertragsvorlagen</p>
        </div>
    </header>

    <div class="container">
        <section class="features">
            <h2 style="grid-column: 1/-1; margin: 30px 0; font-size: 2em;">Features</h2>
            <div class="feature">
                <h3>✓ Projektvertrag</h3>
            </div>
            <div class="feature">
                <h3>✓ Retainer-Vertrag</h3>
            </div>
            <div class="feature">
                <h3>✓ NDA</h3>
            </div>
            <div class="feature">
                <h3>✓ AGB</h3>
            </div>
            <div class="feature">
                <h3>✓ Datenschutzerklärung</h3>
            </div>
        </section>

        <section class="pricing">
            <h2>Jetzt kaufen</h2>
            <div class="price">€37</div>
            <p>Einmalige Zahlung • Lifetime Access</p>
            <a href="#" class="cta">Jetzt kaufen</a>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 Freelancer Tools. Alle Rechte vorbehalten.</p>
        <p><a href="#" style="color: white;">Datenschutz</a> | <a href="#" style="color: white;">Impressum</a></p>
    </footer>
</body>
</html>
